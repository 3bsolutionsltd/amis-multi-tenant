# ── AMIS Nginx Virtual Hosts ─────────────────────────────────────────────────
# Place this file at: /etc/nginx/sites-available/amis.conf
# Enable with:        ln -s /etc/nginx/sites-available/amis.conf /etc/nginx/sites-enabled/
# Test with:          nginx -t
# Reload with:        systemctl reload nginx
#
# Domains:
#   amis.institute       → AMIS web frontend  (Docker: localhost:8095)
#   api.amis.institute   → AMIS Fastify API   (Docker: localhost:3001)
#
# TLS certificates are managed by certbot. Run ONCE after DNS propagates:
#   certbot --nginx -d amis.institute -d api.amis.institute
# Certbot will rewrite the ssl_certificate lines and add the redirect below.
# ─────────────────────────────────────────────────────────────────────────────

# ── Frontend: amis.institute ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name amis.institute;

    # ACME challenge for certbot. After certs are issued certbot will add the
    # HTTPS server block and replace this location with a redirect.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        proxy_pass         http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── API: api.amis.institute ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.amis.institute;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# NOTE: HTTPS server blocks are added automatically by certbot.
# After running: certbot --nginx -d amis.institute -d api.amis.institute
# certbot will append the 443 server blocks with ssl_certificate lines.
