# ── AMIS Nginx Virtual Hosts ─────────────────────────────────────────────────
# Place this file at: /etc/nginx/sites-available/amis.conf
# Enable with:        ln -s /etc/nginx/sites-available/amis.conf /etc/nginx/sites-enabled/
# Test with:          nginx -t
# Reload with:        systemctl reload nginx
#
# Domains:
#   amis.institute       → AMIS web frontend  (Docker: localhost:8095)
#   api.amis.institute   → AMIS Fastify API   (Docker: localhost:3001)
#
# TLS certificates are managed by certbot. Run ONCE after DNS propagates:
#   certbot --nginx -d amis.institute -d api.amis.institute
# Certbot will rewrite the ssl_certificate lines and add the redirect below.
# ─────────────────────────────────────────────────────────────────────────────

# ── Frontend: amis.institute ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name amis.institute;

    # Certbot will replace this block with a redirect to HTTPS after cert issuance.
    # Until then, requests on port 80 are served (for ACME challenge).
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name amis.institute;

    # Filled in by certbot:
    # ssl_certificate     /etc/letsencrypt/live/amis.institute/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/amis.institute/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass         http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── API: api.amis.institute ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.amis.institute;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.amis.institute;

    # Filled in by certbot:
    # ssl_certificate     /etc/letsencrypt/live/amis.institute/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/amis.institute/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
