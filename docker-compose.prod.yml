services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-amis}
    # No host port published — only reachable by other containers on this network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amis}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-amis}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:-amis}
      APP_DATABASE_URL: postgres://app_user:${APP_DB_PASSWORD:?required}@db:5432/${POSTGRES_DB:-amis}
      JWT_SECRET: ${JWT_SECRET:?required}
      CORS_ORIGIN: ${CORS_ORIGIN:?required}
    # Published on 3001 so native Nginx can proxy_pass to localhost:3001
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?required}
    # Published on 8095 so native Nginx can proxy_pass to localhost:8095
    ports:
      - "127.0.0.1:8095:80"
    depends_on:
      - api
    restart: unless-stopped

  migrate:
    image: ghcr.io/amacneil/dbmate:latest
    command: up
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-amis}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:-amis}?sslmode=disable
    volumes:
      - ./db/migrations:/db/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
